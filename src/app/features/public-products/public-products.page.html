<ion-header>
  <ion-toolbar>
     <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Productos Públicos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    @for (product of productService.allProducts(); track product.id) {
      <ion-item lines="none">

        <ion-thumbnail slot="start" class="incidencia-thumb">
          <img 
            [src]="product.imageUrl || 'assets/no-image.jpg'" 
            (error)="onImageError($event)"
            alt="imagen"
          />
        </ion-thumbnail>

        <!-- Texto -->
        <ion-label>
          <h2>{{ product.name }}</h2>
          <p>{{ product.description }}</p>
        </ion-label>
      </ion-item>
    } @empty {
      <ion-item>No hay productos disponibles.</ion-item>
    }
  </ion-list>
</ion-content>
